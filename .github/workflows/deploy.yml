name: Deploy to GitHub Pages

on:
  # Build & publish on every push to main.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the GitHub Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Optional: enables the Google Photorealistic 3D campus tour.
          # Add a repo secret named VITE_GOOGLE_MAPS_API_KEY (Map Tiles API,
          # HTTP-referrer restricted). Without it, the app falls back to the
          # stylized 3D campus scene.
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          # Optional: enables the AI concierge. Add a repo VARIABLE named
          # VITE_AI_ENDPOINT = your backend URL (see server/README.md). It's a
          # public URL, so a variable (not a secret) is fine.
          VITE_AI_ENDPOINT: ${{ vars.VITE_AI_ENDPOINT }}
          # Optional: enables the "Request info" lead form. Add a repo VARIABLE
          # named VITE_WEB3FORMS_KEY (from web3forms.com — the access key is
          # public-safe). Optionally VITE_LEAD_EMAIL for the mailto fallback.
          # Without the key, the form still works via a prefilled email.
          VITE_WEB3FORMS_KEY: ${{ vars.VITE_WEB3FORMS_KEY }}
          VITE_LEAD_EMAIL: ${{ vars.VITE_LEAD_EMAIL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
